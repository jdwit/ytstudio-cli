name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - scripts/build_docs_reference.py
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: write

# Serialize deploys against the gh-pages branch; PR builds run in parallel
# because they only build and never push.
concurrency:
  group: docs-${{ github.event_name == 'pull_request' && github.head_ref || 'deploy' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --locked --group docs

      - name: Build (strict)
        run: uv run mkdocs build --strict

      - name: Deploy to gh-pages
        if: |
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && github.ref == 'refs/heads/main'
        run: uv run mkdocs gh-deploy --force --no-history
